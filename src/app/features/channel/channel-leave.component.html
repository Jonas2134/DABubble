<div class="channel-leave-overlay" role="dialog" aria-modal="true" aria-label="Channel bearbeiten" (click)="closeWindow()" (keydown.escape)="closeWindow()">
    <section tabindex="0" role="document" (click)="$event.stopPropagation()" (keydown.enter)="$event.stopPropagation()">
        <header>
            <div>
                <img src="assets/icons/hashtag.svg" alt="" aria-hidden="true">
                <h1>{{ channelData?.name}}</h1>
            </div>
            <app-button variant="icon" color="white" icon="close" ariaLabel="Schließen" (clicked)="closeWindow()"></app-button>
        </header>
        <div class="scrollContainer">
            <app-channel-name-editor
              [channelData]="channelData"
              (nameUpdated)="nameUpdated.emit($event)"
            ></app-channel-name-editor>

            <app-channel-description-editor
              [channelData]="channelData"
            ></app-channel-description-editor>

            <div class="memberListMobile">
                <app-device-visible mode="mobileBig">
                    <h1 class="mobileHeadlineMember">Mitglieder</h1>
                    <app-member-list
                    [channelMembers]="channelMembers"
                    [activeUserId]="activeUserId"
                    (addMember)="addMember.emit()"
                    (showProfil)="toggleMemberProfil($event)"
                  ></app-member-list>
                </app-device-visible>
            </div>
            <div class="channelLeaveButton">
                <app-button color="rose" (clicked)="removeMember()">Channel verlassen</app-button>
            </div>
        </div>
    </section>
</div>
@if (isChannelMemberProfilOpen) {
    <app-profil
    [activeUserId]="activeUserId ?? ''"
    [userImage]="activeChannelMemberProfil?.userImage ?? ''"
    [userName]="activeChannelMemberProfil?.name ?? ''"
    [userEmail]="activeChannelMemberProfil?.email ?? ''"
    [userStatus]="activeChannelMemberProfil?.status ?? false"
    [userId]="activeChannelMemberProfil?.id ?? ''"
    #profilRef
    size="big"
    [showButton]="activeUserId !== activeChannelMemberProfil?.id"
    (closed)="toggleMemberProfil()"
    (openChat)="openChat.emit($event)"
    ></app-profil>
}
@if (newChannelMembers) {
    <div tabindex="0" role="button" (click)="closeAddMember()" (keydown.enter)="closeAddMember()" class="memberAdd">
        <app-add-new-members
        @slideUpDown
        [@.disabled]="!isMobile"
        (click)="$event.stopPropagation()"
        (closed)="closeAddMember()"
        [channelMembers]="channelMembers"
        [activeUserId]="activeUserId"
        [channelId]="channelData?.id ?? ''"
        [channelName]="channelData?.name ?? ''"
        [showInput]="true"
        [showXLine]="true"
      ></app-add-new-members>
    </div>
  }
