@if (isEmojiPickerOpen) {
@defer {
<emoji-mart #emojiPicker (emojiClick)="addEmoji($event)"></emoji-mart>
} @loading {
<div class="emoji-loading">Laden…</div>
}
} @if (displaySuggestions) {
<ul class="suggestions" role="listbox">
  @for(user of foundUsers; track user) {
  <li role="option" aria-selected="false" tabindex="0" (click)="insertUserSuggestion(user)" (keydown.enter)="insertUserSuggestion(user)">
    <div class="user-img-status">
      <img src="{{ user?.userImage }}" [alt]="user?.name + ' Profilbild'" />
      <span [ngClass]="user?.status ? 'online' : 'offline'"></span>
    </div>
    <span>{{ user?.name }}</span>
  </li>
  } @for(channel of foundChannels; track channel) {
  <li role="option" aria-selected="false" tabindex="0" (click)="insertChannelSuggestion(channel)" (keydown.enter)="insertChannelSuggestion(channel)">#{{ channel?.name }}</li>
  }
</ul>
}

<textarea
  [placeholder]="getPlaceholder()"
  [attr.aria-label]="getPlaceholder()"
  [value]="newMessageText"
  #messageInput
  (input)="onTextChange($event)"
  (keydown)="handleKeyDown($event)"
  rows="2"
></textarea>

<div class="textfield-buttons">
  <div>
    <app-button variant="icon" color="transparent" icon="sentiment_satisfied" ariaLabel="Emoji einfügen" (clicked)="toggleEmojiPicker()"></app-button>
    <app-button variant="icon" color="transparent" icon="alternate_email" ariaLabel="Person erwähnen" (clicked)="openUserSuggestions()"></app-button>
  </div>

  <app-button variant="icon" color="transparent" icon="send" ariaLabel="Nachricht senden" [disabled]="!newMessageText.trim()" (clicked)="sendMessage()"></app-button>
</div>
