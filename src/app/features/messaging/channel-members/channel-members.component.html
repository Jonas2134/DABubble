<div class="overlay" role="dialog" aria-modal="true" aria-label="Mitglieder verwalten" (click)="onOverlayClick($event)" (keydown.escape)="closeChannelMembers()">
  <div #memberAddWrapper tabindex="0" role="document" (click)="$event.stopPropagation()" (keydown.enter)="$event.stopPropagation()" [class.hidden]="!newChannelMembers">
    <app-add-new-members
      [channelMembers]="channelMembers"
      [activeUserId]="activeUserId"
      [channelId]="channelId"
      [channelName]="channelName"
      (closed)="closeAddMembers()"
      [showInput]="true"
    ></app-add-new-members>
  </div>
  <section #channelWrapper tabindex="0" role="document" (click)="$event.stopPropagation()" (keydown.enter)="$event.stopPropagation()" [class.hidden]="newChannelMembers">
    <div class="memberlist-header">
      <h1>Mitglieder</h1>
      <app-button variant="icon" color="white" icon="close" ariaLabel="Schließen" (clicked)="closeChannelMembers()"></app-button>
    </div>
    <app-member-list
      [channelMembers]="channelMembers"
      [activeUserId]="activeUserId"
      (addMember)="addChannelMember()"
      (showProfile)="toggleMemberProfile($event)"
    ></app-member-list>
  </section>
</div>

@if (isChannelMemberProfileOpen) {
  <app-profile
    [activeUserId]="activeUserId ?? ''"
    [userImage]="activeChannelMemberProfile?.userImage ?? ''"
    [userName]="activeChannelMemberProfile?.name ?? ''"
    [userEmail]="activeChannelMemberProfile?.email ?? ''"
    [userStatus]="activeChannelMemberProfile?.status ?? false"
    [userId]="activeChannelMemberProfile?.id ?? ''"
    #profileRef
    size="big"
    [showButton]="activeUserId !== activeChannelMemberProfile?.id"
    (closed)="toggleMemberProfile()"
    (openChat)="openChat.emit($event)"
  ></app-profile>
}
