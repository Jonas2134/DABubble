<div
  class="message-actions"
  [class.always]="isOptionsOpen"
  [class.user-message-actions]="message.mSenderId === activeUserId"
>
  @if (chatType !== 'thread') {
    @for (reaction of activeUserData?.uLastReactions; track reaction) {
    <span (click)="reactionAdd.emit(reaction)">{{ reaction }}</span>
    }
  }

  <button
    class="material-symbols action-btn"
    aria-label="Reaktion hinzufügen"
    (click)="emojiPickerToggle.emit($event)"
  >
    add_reaction
  </button>

  <button
    class="material-symbols action-btn"
    [class.d-none]="chatType === 'thread'"
    aria-label="In Thread antworten"
    (click)="threadOpen.emit()"
  >
    comment
  </button>

  <button
    #optionsBtn
    class="material-symbols action-btn"
    [class.d-none]="message.mSenderId !== activeUserId"
    aria-label="Weitere Optionen"
    [attr.aria-expanded]="isOptionsOpen"
    (click)="toggleOptions($event)"
  >
    more_vert
  </button>

  @if (isOptionsOpen) {
  <div
    #optionsMenu
    class="options-menu"
    role="menu"
    [class.active-user-options]="message.mSenderId === activeUserId"
  >
    <button role="menuitem" (click)="editOpen.emit()">Nachricht bearbeiten</button>
    <button role="menuitem" (click)="deleteOpen.emit()">Nachricht löschen</button>
  </div>
  }
</div>
