@if (isEmojiPickerOpen) {
@defer {
<emoji-mart #emojiPicker (emojiClick)="addEmoji($event)"></emoji-mart>
} @loading {
<div class="emoji-loading">Laden…</div>
}
} @if (displaySuggestions) {
<ul class="suggestions" role="listbox">
  @for(user of foundUsers; track user) {
  <li role="option" (click)="insertUserSuggestion(user)">
    <div class="user-img-status">
      <img src="{{ user?.uUserImage }}" [alt]="user?.uName + ' Profilbild'" />
      <span [ngClass]="user?.uStatus ? 'online' : 'offline'"></span>
    </div>
    <span>{{ user?.uName }}</span>
  </li>
  } @for(channel of foundChannels; track channel) {
  <li role="option" (click)="insertChannelSuggestion(channel)">#{{ channel?.cName }}</li>
  }
</ul>
}

<textarea
  [placeholder]="getPlaceholder()"
  [attr.aria-label]="getPlaceholder()"
  [(ngModel)]="newMessageText"
  #messageInput
  (input)="onTextChange($event)"
  (keydown)="handleKeyDown($event)"
  rows="2"
></textarea>

<div class="textfield-buttons">
  <div>
    <button class="icon-button blue-hover" aria-label="Emoji einfügen" (click)="toggleEmojiPicker($event)">
      <span class="material-symbols textfield-icon">sentiment_satisfied</span>
    </button>

    <button class="icon-button blue-hover" aria-label="Person erwähnen" (click)="openUserSuggestions()">
      <span class="material-symbols textfield-icon">alternate_email</span>
    </button>
  </div>

  <button class="icon-button" aria-label="Nachricht senden" [disabled]="!newMessageText.trim()" (click)="sendMessage()">
    <span class="material-symbols send-icon">send</span>
  </button>
</div>
