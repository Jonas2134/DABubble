<div role="search" class="search-bar-wrapper" #searchWrapper>
    <app-device-visible mode="tabletBig">
      <input (keyup)="onKey($event)" [(ngModel)]="searchValue" type="search" placeholder="Gehe zu..." aria-label="Suche" #inputRef/>
    </app-device-visible>

    <app-device-visible mode="desktopBig">
      <input (keyup)="onKey($event)" [(ngModel)]="searchValue" type="search" placeholder="Devspace durchsuchen" aria-label="Devspace durchsuchen" #inputRef/>
    </app-device-visible>

    <div class="searchButton" aria-hidden="true">
      <img src="assets/icons/search.svg" alt="" />
    </div>
    @if (showInformation) {
      <app-search-information
      [searchText]="searchValue"
      (close)="closeSearchInfo()"
      (openChat)="openChat.emit($event)"
      (openThread)="openThread.emit($event)">
    </app-search-information>
    }

</div>

@if (showInformation) {
  <div 
  class="backdrop" 
  (click)="closeSearchInfo()">
</div>
}
