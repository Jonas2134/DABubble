<div class="user-menu-wrapper">
  <div class="avatar">
    <span class="avatarNameText">{{ userName }}</span>
    <div class="userStatus">
      <app-device-visible mode="tabletBig">
          <img #tabletToggleBtn tabindex="0" role="button" (click)="toggleImage()" (keydown.enter)="toggleImage()" [src]="userImage" [alt]="userName + ' Profilbild'" />
      </app-device-visible>
      <app-device-visible mode="desktopBig">
        <img class="normalImage" tabindex="0" role="button" (click)="toggleImage()" (keydown.enter)="toggleImage()" [src]="userImage" [alt]="userName + ' Profilbild'" />
        <span class="normalImagePoint" [ngClass]="userStatus ? 'online' : 'offline'" [attr.aria-label]="userStatus ? 'Online' : 'Abwesend'"></span>
      </app-device-visible>
    </div>
  </div>
  <app-button class="openLogOut" variant="icon" color="transparent" icon="keyboard_arrow_down" ariaLabel="Benutzermenü" (clicked)="toggleLogOut()" #arrowToggleBtn></app-button>
</div>
@if (isLogOutVisible) {
  <div role="menu" aria-label="Benutzermenü">
    <div class="popUpStyle" @slideUpDown [@.disabled]="windowSize > 1000">
      <app-device-visible mode="tabletBig">
          <div class="popUpXLine"></div>
      </app-device-visible>
      <div class="logOut" #logOutBox>
        <button role="menuitem" (click)="openProfil()">
          <span class="material-symbols">account_circle</span>
          <span>Profil</span>
        </button>
        <button role="menuitem" (click)="logOut()">
          <span class="material-symbols">logout</span>
          <span>Log out</span>
        </button>
      </div>
    </div>
  </div>
}
<div #profilWrapper>
  @if (showProfil) {
    <app-profil
    [activeUserId]="activeUserId ?? ''"
    [userImage]="userImage"
    [userName]="userName"
    [userEmail]="userEmail"
    [userStatus]="userStatus"
    [userId]="userId"
    #profilRef
    (closed)="showProfil = false"
    (openChat)="openChat.emit($event)" 
    size="small"
    [showButton]="false"
  ></app-profil>
  }
</div>
